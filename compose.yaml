services:
  postgres:
    image: 'postgres:16-alpine'
    container_name: 'taskflow-postgres'
    environment:
      - 'POSTGRES_DB=taskflow'
      - 'POSTGRES_PASSWORD=password'
      - 'POSTGRES_USER=user'
    ports:
      - '5433:5432'
    volumes:
      - taskflow_pg_data:/var/lib/postgresql/data

volumes:
  taskflow_pg_data: